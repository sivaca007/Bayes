<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bayes Theorem Interactive</title>

<style>
body {
    background: #111827;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    display: flex;
    gap: 40px;
    background: #1f2937;
    padding: 30px;
    border-radius: 15px;
    width: 900px;
}

/* LEFT SIDE */
.left {
    width: 50%;
}

h2 {
    text-align: center;
}

.slider-box {
    margin: 20px 0;
}

label {
    display: block;
    margin-bottom: 5px;
}

input[type="range"] {
    width: 100%;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    text-align: center;
}

.bar {
    display: flex;
    height: 50px;
    margin-top: 30px;
    border-radius: 8px;
    overflow: hidden;
}

.part1 {
    background: #a5b4fc;
}

.part2 {
    background: #fde68a;
}

.part3 {
    background: #e5e7eb;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h2>Bayes Theorem</h2>
        <p style="text-align:center;">
            P(A|B) = (P(B|A) × P(A)) / P(B)
        </p>

        <div class="slider-box">
            <label>P(A): <span id="pa_val">0.48</span></label>
            <input type="range" min="0" max="1" step="0.01" value="0.48" id="pa">
        </div>

        <div class="slider-box">
            <label>P(B | A): <span id="pba_val">0.85</span></label>
            <input type="range" min="0" max="1" step="0.01" value="0.85" id="pba">
        </div>

        <div class="slider-box">
            <label>P(B | ¬A): <span id="pbna_val">0.22</span></label>
            <input type="range" min="0" max="1" step="0.01" value="0.22" id="pbna">
        </div>

        <div class="result" id="formula">
            P(A|B) ≈ -- , P(B) ≈ --
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3>Posterior = useful evidence / total evidence</h3>

        <p id="pb_text">P(B) = --</p>

        <div class="bar">
            <div class="part1" id="part1"></div>
            <div class="part2" id="part2"></div>
            <div class="part3" id="part3"></div>
        </div>

        <p id="details"></p>
    </div>

</div>

<script>

const pa = document.getElementById("pa");
const pba = document.getElementById("pba");
const pbna = document.getElementById("pbna");

function update() {
    let P_A = parseFloat(pa.value);
    let P_B_A = parseFloat(pba.value);
    let P_B_notA = parseFloat(pbna.value);

    let P_notA = 1 - P_A;

    let P_B = (P_B_A * P_A) + (P_B_notA * P_notA);
    let posterior = (P_B_A * P_A) / P_B;

    // Update labels
    document.getElementById("pa_val").innerText = P_A.toFixed(2);
    document.getElementById("pba_val").innerText = P_B_A.toFixed(2);
    document.getElementById("pbna_val").innerText = P_B_notA.toFixed(2);

    // Update results
    document.getElementById("formula").innerHTML =
        `P(A|B) ≈ ${posterior.toFixed(2)}, P(B) ≈ ${P_B.toFixed(2)}`;

    document.getElementById("pb_text").innerText =
        `P(B) = ${P_B.toFixed(2)}`;

    // Bar visualization
    let useful = P_B_A * P_A;
    let falsePart = P_B_notA * P_notA;

    let total = useful + falsePart;

    let width1 = (useful / total) * 100;
    let width2 = (falsePart / total) * 100;
    let width3 = 100 - width1 - width2;

    document.getElementById("part1").style.width = width1 + "%";
    document.getElementById("part2").style.width = width2 + "%";
    document.getElementById("part3").style.width = width3 + "%";

    document.getElementById("details").innerHTML =
        `Useful: ${(useful).toFixed(2)} | False: ${(falsePart).toFixed(2)} | Posterior: ${posterior.toFixed(2)}`;
}

// Event listeners
pa.oninput = update;
pba.oninput = update;
pbna.oninput = update;

// Initial run
update();

</script>

</body>
</html>
